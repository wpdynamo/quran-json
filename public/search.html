<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بحث في القرآن الكريم</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .search-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }
        .search-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2em;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            transition: border-color 0.3s;
        }
        .search-input:focus {
            outline: none;
            border-color: #3498db;
        }
        .search-btn {
            width: 100%;
            margin-top: 15px;
            padding: 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .search-btn:hover {
            background: #2980b9;
        }
        .results {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .result-item {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            margin-bottom: 15px;
        }
        .result-item:last-child {
            border-bottom: none;
        }
        .verse-arabic {
            font-size: 1.8em;
            line-height: 2;
            color: #2c3e50;
            margin-bottom: 15px;
            text-align: center;
        }
        .verse-english {
            font-size: 1.1em;
            color: #555;
            line-height: 1.8;
            margin-bottom: 10px;
        }
        .verse-info {
            color: #7f8c8d;
            font-size: 0.95em;
            padding-top: 10px;
            border-top: 1px solid #ecf0f1;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }
        .no-results {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
            font-size: 1.2em;
        }
        .info-box {
            background: #ecf0f1;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: center;
            color: #555;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔍 بحث في القرآن الكريم</h1>
    </div>

    <div class="container">
        <a href="/" class="back-link">← العودة للرئيسية</a>

        <div class="search-box">
            <input type="text" id="searchInput" class="search-input" placeholder="ابحث في القرآن الكريم... (مثال: رحمة، mercy، الله)">
            <button onclick="search()" class="search-btn">بحث</button>
        </div>

        <div class="info-box">
            💡 يمكنك البحث بالعربية أو الإنجليزية في جميع آيات القرآن الكريم
        </div>

        <div id="results"></div>
    </div>

    <script>
        let allVerses = [];
        let chapters = [];

        // Load all data on page load
        async function loadData() {
            try {
                // Load chapters info
                const chaptersRes = await fetch('/assets/quran/chapters.json');
                chapters = await chaptersRes.json();

                // Load all surahs
                const promises = [];
                for (let i = 1; i <= 114; i++) {
                    const surahNum = String(i).padStart(3, '0');
                    promises.push(fetch(`/assets/quran/s${surahNum}.json`).then(r => r.json()));
                }
                const surahs = await Promise.all(promises);
                allVerses = surahs.flat();
                console.log('Loaded', allVerses.length, 'verses');
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        function getChapterName(surahId) {
            const chapter = chapters.find(ch => ch.id === surahId);
            return chapter ? chapter.name_arabic : `سورة ${surahId}`;
        }

        function search() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const resultsDiv = document.getElementById('results');

            if (!query) {
                resultsDiv.innerHTML = '<div class="no-results">الرجاء إدخال كلمة للبحث</div>';
                return;
            }

            if (allVerses.length === 0) {
                resultsDiv.innerHTML = '<div class="loading">جاري تحميل البيانات...</div>';
                return;
            }

            resultsDiv.innerHTML = '<div class="loading">جاري البحث...</div>';

            setTimeout(() => {
                const results = allVerses.filter(verse => {
                    const arabicMatch = verse.ar && verse.ar.toLowerCase().includes(query);
                    const englishMatch = verse.en && verse.en.toLowerCase().includes(query);
                    return arabicMatch || englishMatch;
                });

                if (results.length === 0) {
                    resultsDiv.innerHTML = '<div class="no-results">لم يتم العثور على نتائج</div>';
                    return;
                }

                let html = '<div class="results">';
                html += `<h3 style="margin-bottom: 20px; color: #2c3e50;">النتائج: ${results.length} آية</h3>`;
                
                results.slice(0, 50).forEach(verse => {
                    const chapterName = getChapterName(verse.s);
                    html += `
                        <div class="result-item">
                            <div class="verse-arabic">${verse.ar}</div>
                            <div class="verse-english">${verse.en}</div>
                            <div class="verse-info">
                                📖 ${chapterName} - الآية ${verse.a}
                                ${verse.m.juz ? ` | الجزء ${verse.m.juz}` : ''}
                                ${verse.m.page ? ` | الصفحة ${verse.m.page}` : ''}
                            </div>
                        </div>
                    `;
                });

                if (results.length > 50) {
                    html += `<div class="info-box">عرض أول 50 نتيجة من ${results.length}</div>`;
                }

                html += '</div>';
                resultsDiv.innerHTML = html;
            }, 100);
        }

        // Allow search on Enter key
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                search();
            }
        });

        // Load data when page loads
        loadData();
    </script>
</body>
</html>
