<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 60px 40px;
            text-align: center;
        }
        .error-code {
            font-size: 8em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2em;
        }
        p {
            color: #666;
            line-height: 1.8;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .suggestions {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin: 30px 0;
            text-align: right;
        }
        .suggestions h3 {
            color: #764ba2;
            margin-bottom: 15px;
        }
        .suggestions ul {
            list-style: none;
        }
        .suggestions li {
            padding: 8px 0;
        }
        .suggestions a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .suggestions a:hover {
            text-decoration: underline;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1>الصفحة غير موجودة</h1>
        <p>عذراً، الصفحة التي تبحث عنها غير موجودة أو تم نقلها.</p>

        <div class="suggestions">
            <h3>📌 روابط مفيدة:</h3>
            <ul>
                <li>🏠 <a href="/">الصفحة الرئيسية</a></li>
                <li>📖 <a href="/assets/quran/manifest_multi.json">البيانات الوصفية</a></li>
                <li>📝 <a href="/assets/quran/s001.json">سورة الفاتحة</a></li>
                <li>📚 <a href="/assets/quran/index_juz.json">فهرس الأجزاء</a></li>
            </ul>
        </div>

        <a href="/" class="btn">العودة للرئيسية</a>
    </div>
</body>
</html>
