<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
        }
        .header {
            background: #2c3e50;
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .nav-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .logo {
            font-size: 1.3em;
            font-weight: 600;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo:hover {
            opacity: 0.9;
        }
        .nav-links {
            display: flex;
            gap: 10px;
        }
        .nav-link {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.9em;
            transition: all 0.3s;
            background: rgba(255,255,255,0.1);
        }
        .nav-link:hover {
            background: rgba(255,255,255,0.2);
        }
        .content-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 60px);
            padding: 20px;
        }
        .container {
            max-width: 600px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 40px 20px;
            text-align: center;
        }
        .error-code {
            font-size: 5em;
            font-weight: bold;
            color: #e74c3c;
            margin-bottom: 15px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        p {
            color: #7f8c8d;
            line-height: 1.7;
            margin-bottom: 25px;
            font-size: 1em;
        }
        .suggestions {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin: 25px 0;
            text-align: right;
        }
        .suggestions h3 {
            color: #2c3e50;
            margin-bottom: 12px;
            font-size: 1.1em;
        }
        .suggestions ul {
            list-style: none;
        }
        .suggestions li {
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
            font-size: 0.95em;
        }
        .suggestions li:last-child {
            border-bottom: none;
        }
        .suggestions a {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .suggestions a:hover {
            color: #2980b9;
        }
        .btn {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 12px 30px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95em;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52,152,219,0.3);
        }

        /* Tablet and Desktop */
        @media (min-width: 768px) {
            .nav-bar {
                padding: 20px;
            }
            .logo {
                font-size: 1.5em;
            }
            .nav-links {
                gap: 15px;
            }
            .nav-link {
                padding: 10px 20px;
                font-size: 1em;
            }
            .container {
                padding: 60px 40px;
            }
            .error-code {
                font-size: 7em;
                margin-bottom: 20px;
            }
            h1 {
                font-size: 2em;
                margin-bottom: 20px;
            }
            p {
                font-size: 1.1em;
                margin-bottom: 30px;
            }
            .suggestions {
                padding: 25px;
                margin: 30px 0;
            }
            .suggestions h3 {
                font-size: 1.2em;
                margin-bottom: 15px;
            }
            .suggestions li {
                padding: 10px 0;
                font-size: 1em;
            }
            .btn {
                padding: 15px 40px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <nav class="nav-bar">
            <a href="/" class="logo">
                <span>🕌</span>
                <span>Quran API</span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link">الرئيسية</a>
                <a href="/reader.html" class="nav-link">القارئ</a>
            </div>
        </nav>
    </div>

    <div class="content-wrapper">
        <div class="container">
        <div class="error-code">404</div>
        <h1>الصفحة غير موجودة</h1>
        <p>عذراً، الصفحة التي تبحث عنها غير موجودة أو تم نقلها.</p>

        <div class="suggestions">
            <h3>📌 روابط مفيدة:</h3>
            <ul>
                <li>🏠 <a href="/">الصفحة الرئيسية</a></li>
                <li>📖 <a href="/reader.html">قارئ القرآن الكريم</a></li>
                <li>📊 <a href="/assets/quran/stats.json">الإحصائيات</a></li>
                <li>📚 <a href="/assets/quran/chapters.json">معلومات السور</a></li>
            </ul>
        </div>

        <a href="/" class="btn">العودة للرئيسية</a>
    </div>
    </div>
</body>
</html>
