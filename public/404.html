<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 60px 40px;
            text-align: center;
        }
        .error-code {
            font-size: 7em;
            font-weight: bold;
            color: #e74c3c;
            margin-bottom: 20px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 2em;
        }
        p {
            color: #7f8c8d;
            line-height: 1.8;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .suggestions {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
            margin: 30px 0;
            text-align: right;
        }
        .suggestions h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        .suggestions ul {
            list-style: none;
        }
        .suggestions li {
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .suggestions li:last-child {
            border-bottom: none;
        }
        .suggestions a {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .suggestions a:hover {
            color: #2980b9;
        }
        .btn {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 15px 40px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52,152,219,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1>الصفحة غير موجودة</h1>
        <p>عذراً، الصفحة التي تبحث عنها غير موجودة أو تم نقلها.</p>

        <div class="suggestions">
            <h3>📌 روابط مفيدة:</h3>
            <ul>
                <li>🏠 <a href="/">الصفحة الرئيسية</a></li>
                <li>📖 <a href="/reader.html">قارئ القرآن الكريم</a></li>
                <li>📊 <a href="/assets/quran/stats.json">الإحصائيات</a></li>
                <li>📚 <a href="/assets/quran/chapters.json">معلومات السور</a></li>
            </ul>
        </div>

        <a href="/" class="btn">العودة للرئيسية</a>
    </div>
</body>
</html>
